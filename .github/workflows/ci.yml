name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Workspace check
    runs-on: ubuntu-latest
    env:
      APP_ENV: preview
      MCP_ENV: stub
      CAPABILITY_LEVEL: read_only
      ALLOW_REAL_SWIGGY_MUTATIONS: "false"
      ALLOW_REAL_SWIGGY_ORDERS: "false"
      RUNTIME_MODEL_PROVIDER: deterministic
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run aggregate check
        run: pnpm check

      - name: Capability assertion
        run: pnpm assert:capabilities
